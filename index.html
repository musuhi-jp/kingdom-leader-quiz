function wrapText(ctx, text, maxWidth){
  const lines = [];
  let line = '';
  for(const ch of text){
    const test = line + ch;
    if(ctx.measureText(test).width > maxWidth && line !== ''){
      lines.push(line);
      line = ch;
    } else {
      line = test;
    }
  }
  if(line) lines.push(line);
  return lines;
}

async function saveResultImage(character, vec){
  await document.fonts.ready;

  const W = 1080, H = 1350;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const INK = '#17130f', PAPER = '#ece0c4', SEAL = '#a5311f', GOLD = '#c19a49', CREAM = '#f1e6c8', INKSOFT = '#221b14';

  // background
  ctx.fillStyle = INK;
  ctx.fillRect(0,0,W,H);
  const grad = ctx.createRadialGradient(W*0.2,-H*0.1,10,W*0.2,-H*0.1,W*0.9);
  grad.addColorStop(0,'rgba(193,154,73,0.18)');
  grad.addColorStop(1,'rgba(193,154,73,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // header
  ctx.fillStyle = GOLD;
  ctx.font = '700 30px "Shippori Mincho"';
  ctx.textAlign = 'left';
  ctx.fillText('キングダム武将 リーダー診断', 56, 90);

  // paper card
  const cardX = 48, cardY = 150, cardW = W-96, cardH = H-150-70;
  ctx.fillStyle = PAPER;
  ctx.fillRect(cardX, cardY, cardW, cardH);
  ctx.strokeStyle = 'rgba(23,19,15,0.14)';
  ctx.lineWidth = 2;
  ctx.strokeRect(cardX+16, cardY+16, cardW-32, cardH-32);

  // seal
  const sealSize = 150;
  const sealX = W/2 - sealSize/2, sealY = cardY + 60;
  ctx.save();
  ctx.translate(sealX+sealSize/2, sealY+sealSize/2);
  ctx.rotate(-6*Math.PI/180);
  ctx.fillStyle = SEAL;
  roundRect(ctx, -sealSize/2, -sealSize/2, sealSize, sealSize, 10);
  ctx.fill();
  ctx.restore();
  ctx.fillStyle = CREAM;
  ctx.font = '800 40px "Shippori Mincho"';
  ctx.textAlign = 'center';
  ctx.save();
  ctx.translate(sealX+sealSize/2, sealY+sealSize/2);
  ctx.rotate(-6*Math.PI/180);
  ctx.fillText(character.name, 0, 15);
  ctx.restore();

  // eyebrow
  ctx.fillStyle = 'rgba(23,19,15,0.5)';
  ctx.font = '400 20px "Noto Sans JP"';
  ctx.textAlign = 'center';
  ctx.fillText('あなたが最も近いのは', W/2, sealY + sealSize + 50);

  // name
  ctx.fillStyle = INK;
  ctx.font = '800 64px "Shippori Mincho"';
  ctx.fillText(character.name, W/2, sealY + sealSize + 120);

  // title
  ctx.fillStyle = SEAL;
  ctx.font = '700 26px "Noto Sans JP"';
  ctx.fillText(`『${character.title}』タイプ`, W/2, sealY + sealSize + 165);

  // divider
  ctx.fillStyle = GOLD;
  ctx.fillRect(W/2-40, sealY + sealSize + 195, 80, 3);

  // description
  ctx.fillStyle = 'rgba(23,19,15,0.82)';
  ctx.font = '400 26px "Noto Sans JP"';
  ctx.textAlign = 'left';
  const descLines = wrapText(ctx, character.desc, cardW - 120);
  let dy = sealY + sealSize + 250;
  descLines.forEach(line=>{
    ctx.fillText(line, cardX + 60, dy);
    dy += 40;
  });

  // axes box
  const axesY = dy + 30;
  ctx.fillStyle = 'rgba(23,19,15,0.05)';
  ctx.fillRect(cardX+60, axesY, cardW-120, 190);
  ctx.font = '400 22px "Noto Sans JP"';
  AXES.forEach((label,i)=>{
    const rowY = axesY + 40 + i*40;
    ctx.fillStyle = 'rgba(23,19,15,0.6)';
    ctx.textAlign = 'left';
    ctx.fillText(label, cardX+90, rowY);
    ctx.fillStyle = INK;
    ctx.textAlign = 'right';
    ctx.font = '700 22px "Noto Sans JP"';
    ctx.fillText(String(vec[i]), cardX+cardW-90, rowY);
    ctx.font = '400 22px "Noto Sans JP"';
  });

  // footer
  ctx.fillStyle = 'rgba(241,230,200,0.4)';
  ctx.font = '400 20px "Noto Sans JP"';
  ctx.textAlign = 'center';
  ctx.fillText('#キングダム #リーダー診断', W/2, H-30);

  canvas.toBlob(blob=>{
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `kingdom-leader-${character.name}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=> URL.revokeObjectURL(url), 2000);
    showToast('画像を保存しました');
  }, 'image/png');
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}


let current = 0;
let userVec = [0,0,0,0];
let resultChar = null;

function dist(v1, v2){
  return Math.sqrt(v1.reduce((s,val,i)=> s + (val-v2[i])**2, 0));
}

function renderStart(){
  const card = document.getElementById('card');
  card.innerHTML = `
    <div class="start">
      <h1>あなたの中の<br><span>大将軍</span>は、誰だ。</h1>
      <p class="desc">8つの問いに答えるだけ。キングダム実写映画5作に登場した秦・合従軍の武将16名の中から、あなたが本能的に惹かれる「リーダー像」を診断します。</p>
      <div class="roster">
        <span>信</span><span>王騎</span><span>王翦</span><span>嬴政</span><span>桓騎</span><span>李牧</span><span>龐煖</span><span>他10名</span>
      </div>
      <button class="btn primary" id="startBtn">診断をはじめる</button>
    </div>
  `;
  document.getElementById('startBtn').addEventListener('click', startQuiz);
}

function startQuiz(){
  current = 0;
  userVec = [0,0,0,0];
  renderQuestion();
}

function renderQuestion(){
  const card = document.getElementById('card');
  const item = QUESTIONS[current];
  let flags = '';
  for(let i=0;i<QUESTIONS.length;i++){
    flags += `<i class="${i < current ? 'on':''}"></i>`;
  }
  card.innerHTML = `
    <div class="progress-row">
      <div class="count">Q${current+1} / ${QUESTIONS.length}</div>
      <div class="flags">${flags}</div>
    </div>
    <div class="qtext">${item.q}</div>
    <button class="btn" data-choice="0">${item.a.text}</button>
    <button class="btn" data-choice="1">${item.b.text}</button>
  `;
  card.querySelectorAll('[data-choice]').forEach(btn=>{
    btn.addEventListener('click', ()=> answer(Number(btn.dataset.choice)));
  });
}

function answer(choice){
  const item = QUESTIONS[current];
  const d = choice === 0 ? item.a.d : item.b.d;
  userVec = userVec.map((v,i)=> v + d[i]);
  current++;
  if(current < QUESTIONS.length){
    renderQuestion();
  } else {
    renderResult();
  }
}

function renderResult(){
  let best = CHARACTERS[0];
  let bestDist = Infinity;
  for(const c of CHARACTERS){
    const dd = dist(userVec, c.vec);
    if(dd < bestDist){ bestDist = dd; best = c; }
  }
  resultChar = best;

  const card = document.getElementById('card');
  const shareText = `私のリーダー像診断は【${best.name}】でした。\n『${best.title}』タイプ。\n#キングダム #リーダー診断`;
  card.innerHTML = `
    <div class="r-eyebrow">あなたが最も近いのは</div>
    <div class="seal-wrap"><div class="seal">${best.name}</div></div>
    <div class="r-name">${best.name}</div>
    <div class="r-title">『${best.title}』タイプ</div>
    <div class="r-divider"></div>
    <div class="r-desc">${best.desc}</div>
    <div class="r-axes">
      ${AXES.map((a,i)=>`<div class="row"><span>${a}</span><b>${userVec[i]}</b></div>`).join('')}
    </div>
    <div class="action-row">
      <button class="btn ghost" id="saveImgBtn" style="flex:1;">画像を保存</button>
      <button class="btn x-share" id="shareXBtn" style="flex:1;">Xでシェア</button>
    </div>
    <button class="btn ghost" id="retryBtn">もう一度診断する</button>
    <div class="footnote">全16名からの診断・実写映画5作準拠</div>
    <div class="toast" id="toast"></div>
  `;

  document.getElementById('retryBtn').addEventListener('click', startQuiz);
  document.getElementById('saveImgBtn').addEventListener('click', ()=> saveResultImage(best, userVec));
  document.getElementById('shareXBtn').addEventListener('click', ()=> shareOnX(best, shareText));
}

function shareOnX(best, text){
  const url = window.location.href.split('#')[0].split('?')[0];
  const intent = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
  window.open(intent, '_blank', 'noopener');
}

function showToast(msg){
  const toast = document.getElementById('toast');
  if(!toast) return;
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=> toast.classList.remove('show'), 1800);
}

document.addEventListener('DOMContentLoaded', renderStart);

</script>
